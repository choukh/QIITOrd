name: cloudflare

# Build the HTML docs (Agda's native --html backend → pandoc) and deploy them to
# Cloudflare Pages, served at bedrock.institute/QIITOrd.
# The .github/workflows/pages.yml workflow keeps a GitHub Pages mirror.
# Owner setup (once): create a Cloudflare Pages project named "qiitord", route
# bedrock.institute/QIITOrd at it, and add the organization secrets
# CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
#
# The generated site uses only relative links, so it is served correctly under
# the /QIITOrd subpath without any base-URL rewriting.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Agda 2.8.0
        uses: agda/agda-setup-action@v1
        with:
          agda-version: '2.8.0'

      - name: Install and register cubical 0.9
        shell: bash
        run: |
          set -euo pipefail
          curl -fL https://github.com/agda/cubical/archive/refs/tags/v0.9.tar.gz -o cubical.tar.gz
          mkdir -p "${AGDA_DIR}/libraries.d"
          tar xf cubical.tar.gz -C "${AGDA_DIR}/libraries.d/"
          echo "${AGDA_DIR}/libraries.d/cubical-0.9/cubical.agda-lib" >> "${AGDA_DIR}/libraries"

      - name: Register this library
        shell: bash
        run: echo "$(pwd)/QIITOrd.agda-lib" >> "${AGDA_DIR}/libraries"

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: make site

      # Create the Pages project on first run; a no-op (|| true) once it exists.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages project create qiitord --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _build/site --project-name=qiitord
